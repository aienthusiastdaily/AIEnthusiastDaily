name: Public CI

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate public snapshot
    if: github.repository == 'aienthusiastdaily/AIEnthusiastDaily'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate public snapshot shape
        run: |
          set -euo pipefail

          required_files=(
            "README.md"
            "netlify.toml"
            "export-metadata.json"
            "site/index.html"
          )
          for path in "${required_files[@]}"; do
            if [ ! -f "$path" ]; then
              echo "Missing required public file: $path"
              exit 1
            fi
          done

          forbidden_paths=(
            ".contexts"
            ".env"
            ".venv"
            "docs"
            "plans"
            "scripts"
            "personal_landing_page"
            "public_export.toml"
            "pyproject.toml"
            ".github/workflows/branch-cleanup.yml"
            ".github/workflows/ci.yml"
            ".github/workflows/public-export.yml"
          )
          for path in "${forbidden_paths[@]}"; do
            if [ -e "$path" ]; then
              echo "Forbidden private path present in public repo: $path"
              exit 1
            fi
          done

          unexpected_workflow="$(find .github/workflows -type f ! -name public-ci.yml -print -quit 2>/dev/null || true)"
          if [ -n "$unexpected_workflow" ]; then
            echo "Unexpected public workflow file: $unexpected_workflow"
            exit 1
          fi

      - name: Validate export metadata
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          metadata = json.loads(Path("export-metadata.json").read_text(encoding="utf-8"))
          required_fields = {
              "export_id",
              "exported_at",
              "exported_paths",
              "source",
              "source_branch_class",
              "verification",
          }
          missing = sorted(required_fields - set(metadata))
          if missing:
              raise SystemExit(f"Missing export metadata fields: {missing}")

          if not str(metadata["export_id"]).startswith("pex-"):
              raise SystemExit("Export metadata has an invalid export_id")
          if metadata["source"] != "private-public-export":
              raise SystemExit("Export metadata has an invalid source")
          if metadata["source_branch_class"] not in {"sprint", "dev", "main", "other"}:
              raise SystemExit("Export metadata has an invalid source_branch_class")

          exported_paths = set(metadata["exported_paths"])
          expected_paths = {
              "README.md",
              "netlify.toml",
              "site/**",
              ".github/workflows/public-ci.yml",
              "export-metadata.json",
          }
          missing_paths = sorted(expected_paths - exported_paths)
          if missing_paths:
              raise SystemExit(f"Missing exported path metadata: {missing_paths}")

          verification = metadata["verification"]
          if verification.get("forbidden_paths_absent") is not True:
              raise SystemExit("Export metadata does not confirm forbidden paths are absent")
          if verification.get("secret_scan_passed") is not True:
              raise SystemExit("Export metadata does not confirm secret scan passed")
          PY

      - name: Scan tracked files for obvious secrets
        run: |
          python - <<'PY'
          import re
          import subprocess
          from pathlib import Path

          patterns = [
              re.compile(r"sk-[A-Za-z0-9_-]{20,}"),
              re.compile(r"gho_[A-Za-z0-9_]+"),
              re.compile(r"OPENAI_API_KEY\s*="),
              re.compile(r"ANTHROPIC_API_KEY\s*="),
              re.compile(r"GOOGLE_API_KEY\s*="),
              re.compile(r"VERCEL_TOKEN\s*="),
              re.compile(r"NETLIFY_AUTH_TOKEN\s*="),
              re.compile(r"NETLIFY_SITE_ID\s*="),
              re.compile(r"\b(SECRET|TOKEN|PASSWORD)\s*="),
          ]
          output = subprocess.check_output(["git", "ls-files", "-z"])
          files = [item for item in output.decode("utf-8").split("\0") if item]
          findings = []
          for file_name in files:
              path = Path(file_name)
              try:
                  content = path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  continue
              for line_number, line in enumerate(content.splitlines(), start=1):
                  if any(pattern.search(line) for pattern in patterns):
                      findings.append(f"{file_name}:{line_number}")

          if findings:
              joined = "\n".join(findings)
              raise SystemExit(f"Potential secrets found in public snapshot:\n{joined}")
          PY
